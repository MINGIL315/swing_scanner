<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>종목 상세 — Swing Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@5/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root { --accent:#3b82f6; }
    body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',system-ui,sans-serif; }
    .card { background:#161b22; border:1px solid #30363d; border-radius:.75rem; }
    .badge-up   { background:#1c3a2b; color:#3fb950; }
    .badge-side { background:#2b2a1c; color:#d29922; }
    .badge-down { background:#3a1c1c; color:#f85149; }
    .phase-card { border-left:3px solid var(--accent); padding:.75rem 1rem; background:#1c2128; border-radius:0 .5rem .5rem 0; margin-bottom:.5rem; }
    .tf-btn { padding:2px 12px; border-radius:4px; background:#1c2128; color:#8b949e; font-size:.75rem; cursor:pointer; border:1px solid #30363d; }
    .tf-btn.active { background:#58a6ff; color:white; border-color:#58a6ff; }
    .tf-btn:hover:not(.active) { background:#21262d; color:#e6edf3; }
    .spinner { border:3px solid #30363d; border-top:3px solid var(--accent); border-radius:50%; width:1.5rem; height:1.5rem; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body class="min-h-screen">

<header class="border-b border-gray-700 px-6 py-3 flex items-center gap-3 sticky top-0 z-10" style="background:#0d1117">
  <a href="index.html" class="text-gray-400 hover:text-blue-400 text-sm">← 대시보드</a>
  <span class="text-xl font-bold text-blue-400">📈 Swing Scanner</span>
  <span id="fav-btn" onclick="toggleFav()" class="ml-auto cursor-pointer text-xl select-none" title="즐겨찾기">☆</span>
</header>

<main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

  <!-- 종목 헤더 -->
  <section class="card p-5">
    <div class="flex flex-wrap items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold" id="ticker-title">—</h1>
        <p class="text-gray-400 text-sm" id="ticker-name"></p>
      </div>
      <div id="pattern-badges" class="flex flex-wrap gap-2"></div>
    </div>
    <div id="trade-grid" class="grid grid-cols-3 md:grid-cols-6 gap-4 mt-4"></div>
  </section>

  <!-- 통합 차트 — v5 panes (단일 chart 객체에 addSeries(type, opts, paneIndex)) -->
  <section class="card p-2">
    <!-- 차트 상단 정보 바 + 일/주봉 토글 -->
    <div class="flex items-center gap-3 px-2 pt-1 pb-2 border-b border-gray-700">
      <div class="flex gap-1">
        <button id="tf-daily"  class="tf-btn active" onclick="setTimeFrame('daily')">일</button>
        <button id="tf-weekly" class="tf-btn"        onclick="setTimeFrame('weekly')">주</button>
        <button id="tf-4h"     class="tf-btn"        onclick="setTimeFrame('4h')" title="60분봉 → 4시간봉 (KR 분봉 적재 시만)">4H</button>
      </div>
      <div id="chart-info-bar" class="flex flex-wrap items-center gap-3 text-xs text-gray-400"></div>
    </div>
    <div id="chart-main" style="height:600px;"></div>
  </section>

  <!-- AI 코멘트 -->
  <section class="card p-5">
    <h2 class="text-sm font-semibold text-gray-400 mb-3">AI 분석 코멘트</h2>
    <div id="ai-comment"></div>
  </section>

</main>

<script>
const API = '';
const ticker = new URLSearchParams(location.search).get('ticker') || '';
if (!ticker) location.href = 'index.html';

const TREND_CLS = { uptrend:'badge-up', sideways:'badge-side', downtrend:'badge-down' };
const TREND_LBL = { uptrend:'주봉 상승', sideways:'주봉 횡보', downtrend:'주봉 하락' };
const PATTERN_LBL = {
  double_bottom:'쌍바닥', golden_cross:'골든크로스',
  box_breakout:'박스 돌파', pullback:'눌림목'
};
const PHASE_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444'];

// 즐겨찾기
function loadFavs() { return JSON.parse(localStorage.getItem('favs') || '[]'); }
function saveFavs(f) { localStorage.setItem('favs', JSON.stringify(f)); }
function toggleFav() {
  let favs = loadFavs();
  const btn = document.getElementById('fav-btn');
  if (favs.includes(ticker)) {
    favs = favs.filter(t => t !== ticker);
    btn.textContent = '☆';
  } else {
    favs.push(ticker);
    btn.textContent = '★';
    btn.style.color = '#f59e0b';
  }
  saveFavs(favs);
}
function initFav() {
  const btn = document.getElementById('fav-btn');
  if (loadFavs().includes(ticker)) {
    btn.textContent = '★';
    btn.style.color = '#f59e0b';
  }
}

// 차트 공통 옵션 (한국 일봉 — 시간 표시 X, 가격축 너비 고정으로 시간축 정렬)
const PRICE_SCALE_WIDTH = 80;

// 시간축 라벨 포맷터 — 'YYYY-MM-DD' 형태로 통일
function _formatTime(time) {
  if (typeof time === 'object' && time && time.year) {
    return `${time.year}-${String(time.month).padStart(2,'0')}-${String(time.day).padStart(2,'0')}`;
  }
  if (typeof time === 'string') return time.slice(0, 10);
  if (typeof time === 'number') return new Date(time * 1000).toISOString().slice(0, 10);
  return '';
}

function chartOpts(height, showTimeAxis) {
  return {
    width: 0,
    height,
    layout: { background:{ color:'#161b22' }, textColor:'#8b949e' },
    grid: { vertLines:{ color:'#21262d' }, horzLines:{ color:'#21262d' } },
    crosshair: { mode: 0 },  // 0 = Magnet (가까운 캔들에 스냅), 1 = Normal
    rightPriceScale: {
      borderColor:'#30363d',
      minimumWidth: PRICE_SCALE_WIDTH,
    },
    timeScale: {
      borderColor:'#30363d',
      timeVisible: false,
      secondsVisible: false,
      visible: !!showTimeAxis,  // 마지막 차트(rsi)만 라벨 표시
      tickMarkFormatter: _formatTime,
    },
    localization: {
      locale: 'ko-KR',
      dateFormat: 'yyyy-MM-dd',
      timeFormatter: _formatTime,
    },
  };
}

// KR 종목 가격 포맷 (정수 원 + 천 단위 콤마는 LightweightCharts 가 기본)
const PRICE_FORMAT_KR = { type: 'price', precision: 0, minMove: 1 };

async function loadAnalysis() {
  const r = await fetch(`${API}/api/stocks/${ticker}/analysis`);
  if (!r.ok) { document.getElementById('ticker-title').textContent = ticker + ' — 결과 없음'; return; }
  const data = await r.json();
  const first = data[0];

  document.title = `${ticker} — Swing Scanner`;
  document.getElementById('ticker-title').textContent = ticker;
  document.getElementById('ticker-name').textContent = first.name;

  const badges = document.getElementById('pattern-badges');
  data.forEach(d => {
    const tCls = TREND_CLS[d.trend_weekly] || 'badge-side';
    const tLbl = TREND_LBL[d.trend_weekly] || d.trend_weekly || '-';
    badges.innerHTML += `
      <span class="px-2 py-1 rounded text-xs font-semibold bg-blue-900 text-blue-300">${PATTERN_LBL[d.pattern_name]||d.pattern_name}</span>
      <span class="px-2 py-1 rounded text-xs ${tCls}">${tLbl}</span>
      <span class="px-2 py-1 rounded text-xs bg-gray-800 text-white">점수 ${d.confidence_score.toFixed(1)}</span>`;
  });

  const grid = document.getElementById('trade-grid');
  const f = first;

  // 진입 강도 색상 (0~100)
  const entryColor = (s) => {
    if (s == null) return 'text-gray-500';
    return s >= 75 ? 'text-green-400' : s >= 50 ? 'text-yellow-400' : 'text-red-400';
  };
  const entryStr = f.entry_signal_strength != null
    ? `<span class="${entryColor(f.entry_signal_strength)}">${f.entry_signal_strength.toFixed(0)}점</span>`
    : '<span class="text-gray-500">-</span>';

  const fields = [
    ['진입가', f.entry_price?.toLocaleString() || '-'],
    ['손절가', f.stop_loss?.toLocaleString() || '-'],
    ['목표가', f.target_price?.toLocaleString() || '-'],
    ['손익비', f.risk_reward_ratio ? '1:'+f.risk_reward_ratio.toFixed(1) : '-'],
    ['신뢰도', f.confidence_score.toFixed(1)+'점'],
    ['진입 강도', entryStr],
    ['필터', f.passed_filters ? '✅ 통과' : '❌ 미통과'],
  ];
  grid.innerHTML = fields.map(([k,v]) => `
    <div><p class="text-xs text-gray-400">${k}</p><p class="font-semibold mt-0.5">${v}</p></div>`
  ).join('');

  // 진입 신호 컴포넌트 (entry_signals dict[str, bool])
  if (f.entry_signals && typeof f.entry_signals === 'object') {
    const SIGNAL_LABELS = {
      rsi_rising: 'RSI 상승',
      bullish_volume: '거래량 양봉',
      bullish_candle: '양봉 캔들',
      macd_positive: 'MACD 양전환',
      above_ma20: 'MA20 위',
      above_ma60: 'MA60 위',
      neckline_break: '목선 돌파',
      box_break: '박스 돌파',
      volume_surge: '거래량 급증',
      pullback_reversal: '눌림목 반등',
    };
    const chips = Object.entries(f.entry_signals).map(([k, v]) => {
      const label = SIGNAL_LABELS[k] || k;
      const cls = v ? 'bg-green-900 text-green-300' : 'bg-gray-800 text-gray-500';
      const icon = v ? '✓' : '✗';
      return `<span class="px-2 py-0.5 rounded text-xs ${cls}">${icon} ${label}</span>`;
    }).join('');
    if (chips) {
      grid.innerHTML += `<div class="col-span-full mt-2"><p class="text-xs text-gray-400 mb-1.5">진입 신호 컴포넌트 (60분봉 기반)</p><div class="flex flex-wrap gap-1.5">${chips}</div></div>`;
    }
  }

  // 진입/손절/목표 가격 라인 차트에 적용
  setPriceLines({
    entry:  first.entry_price,
    stop:   first.stop_loss,
    target: first.target_price,
  });
  if (window._chartApplyPriceLines) window._chartApplyPriceLines();

  // AI 코멘트
  const cmtEl = document.getElementById('ai-comment');
  first.ai_comment.forEach((phase, i) => {
    const c = PHASE_COLORS[i] || '#6366f1';
    cmtEl.innerHTML += `
      <div class="phase-card" style="border-left-color:${c}">
        <p class="text-xs font-bold mb-1" style="color:${c}">${phase.label}</p>
        <p class="text-sm text-gray-300">${phase.text}</p>
      </div>`;
  });
}

// 진입/손절/목표 가격 라인 — analysis API 결과를 차트에 그리기 위해 보관
let _priceLineParams = null;
function setPriceLines(params) { _priceLineParams = params; }

// 차트 series 핸들 + 응답 데이터 (일/주 토글 시 setData 만 호출하기 위해 보관)
let _chartHandles = null;     // {chart, candleSeries, ma5, ma20, ma60, volSeries, rsiSeries, boundsSeries}
let _ohlcvPayload = null;     // {daily: {...}, weekly: {...}}
let _currentTF = 'daily';

function setTimeFrame(tf) {
  if (!_chartHandles || !_ohlcvPayload || !_ohlcvPayload[tf]) return;
  _currentTF = tf;
  _applyTimeFrame(tf);
  // 버튼 active 표시
  document.getElementById('tf-daily').classList.toggle('active', tf === 'daily');
  document.getElementById('tf-weekly').classList.toggle('active', tf === 'weekly');
  document.getElementById('tf-4h').classList.toggle('active', tf === '4h');
}

// 4시간봉 데이터 유무에 따라 [4H] 버튼 활성/비활성
function _updateTfButtonsAvailability() {
  const btn4h = document.getElementById('tf-4h');
  if (!btn4h || !_ohlcvPayload) return;
  const has4h = _ohlcvPayload['4h'] && _ohlcvPayload['4h'].candles?.length > 0;
  if (!has4h) {
    btn4h.style.opacity = '0.4';
    btn4h.style.cursor = 'not-allowed';
    btn4h.title = '4시간봉 데이터 없음 (KR 분봉 미적재)';
  } else {
    btn4h.style.opacity = '';
    btn4h.style.cursor = 'pointer';
    btn4h.title = '60분봉 → 4시간봉 (drop_partial=False)';
  }
}

function _applyTimeFrame(tf) {
  const d = _ohlcvPayload[tf];
  const h = _chartHandles;
  h.candleSeries.setData(d.candles || []);
  if (h.ma5)  h.ma5.setData(d.ma5  || []);
  if (h.ma20) h.ma20.setData(d.ma20 || []);
  if (h.ma60) h.ma60.setData(d.ma60 || []);
  if (h.volSeries) h.volSeries.setData(d.volume || []);
  if (h.rsiSeries) h.rsiSeries.setData(d.rsi || []);
  if (h.boundsSeries && d.rsi?.length) {
    h.boundsSeries.setData([
      { time: d.rsi[0].time, value: 0 },
      { time: d.rsi[d.rsi.length - 1].time, value: 100 },
    ]);
  }
  _renderInfoBar(d);
  h.chart.timeScale().fitContent();
}

function _renderInfoBar(d) {
  const lastCandle = (d.candles && d.candles[d.candles.length - 1]) || null;
  const lastRsi    = (d.rsi && d.rsi[d.rsi.length - 1]) || null;
  if (!lastCandle) return;
  const fmt = (n) => Number(n).toLocaleString('ko-KR');
  document.getElementById('chart-info-bar').innerHTML = `
    <span class="font-semibold text-gray-200">${lastCandle.time}</span>
    <span>O <span class="text-gray-200">${fmt(lastCandle.open)}</span></span>
    <span>H <span class="text-gray-200">${fmt(lastCandle.high)}</span></span>
    <span>L <span class="text-gray-200">${fmt(lastCandle.low)}</span></span>
    <span>C <span class="text-gray-200">${fmt(lastCandle.close)}</span></span>
    <span class="ml-3" style="color:#f0c040">● MA5</span>
    <span style="color:#58a6ff">● MA20</span>
    <span style="color:#ff7b72">● MA60</span>
    ${lastRsi != null ? `<span class="ml-3" style="color:#a78bfa">RSI(14) ${lastRsi.value.toFixed(1)}</span>` : ''}
  `;
}

async function loadChart() {
  // 3년치(≈750영업일) 가 DB 에 적재됨 → 적재된 만큼 모두 차트에 표시 (1000 = 충분한 buffer)
  const r = await fetch(`${API}/api/stocks/${ticker}/ohlcv?days=1000`);
  if (!r.ok) return;
  // 응답 형태: {daily: {...}, weekly: {...}, "4h": {...} (KR 분봉 적재 시만)}
  _ohlcvPayload = await r.json();
  const d = _ohlcvPayload[_currentTF] || _ohlcvPayload.daily;
  if (!d) return;
  _updateTfButtonsAvailability();

  const el = document.getElementById('chart-main');

  // v5: 단일 차트 + panes (addSeries 의 paneIndex 인자로 분리)
  const chart = LightweightCharts.createChart(el, {
    width: el.offsetWidth,
    height: 600,
    layout: {
      background:{ color:'#161b22' },
      textColor:'#8b949e',
      panes: {
        separatorColor: '#30363d',
        separatorHoverColor: 'rgba(88, 166, 255, 0.2)',
        enableResize: true,
      },
    },
    grid: { vertLines:{ color:'#21262d' }, horzLines:{ color:'#21262d' } },
    crosshair: { mode: 0 },
    rightPriceScale: { borderColor:'#30363d' },
    timeScale: {
      borderColor:'#30363d',
      timeVisible: false,
      secondsVisible: false,
      tickMarkFormatter: _formatTime,
    },
    localization: {
      locale: 'ko-KR',
      dateFormat: 'yyyy-MM-dd',
      timeFormatter: _formatTime,
    },
  });

  // ── pane 0: 캔들 + MA (series 핸들 보관 — 토글 시 setData 만 호출) ──
  const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
    upColor:'#3fb950', downColor:'#f85149',
    borderUpColor:'#3fb950', borderDownColor:'#f85149',
    wickUpColor:'#3fb950', wickDownColor:'#f85149',
    priceFormat: PRICE_FORMAT_KR,
  });
  candleSeries.setData(d.candles || []);

  const ma5  = chart.addSeries(LightweightCharts.LineSeries, { color:'#f0c040', lineWidth:1, priceLineVisible:false, priceFormat: PRICE_FORMAT_KR });
  const ma20 = chart.addSeries(LightweightCharts.LineSeries, { color:'#58a6ff', lineWidth:1, priceLineVisible:false, priceFormat: PRICE_FORMAT_KR });
  const ma60 = chart.addSeries(LightweightCharts.LineSeries, { color:'#ff7b72', lineWidth:1, priceLineVisible:false, priceFormat: PRICE_FORMAT_KR });
  if (d.ma5)  ma5.setData(d.ma5);
  if (d.ma20) ma20.setData(d.ma20);
  if (d.ma60) ma60.setData(d.ma60);

  // ── pane 1: 거래량 ─────────────────────────────────────────────
  const volSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
    priceFormat: { type: 'volume' },
  }, 1);
  volSeries.setData(d.volume || []);

  // ── pane 2: RSI (0~100 강제) ───────────────────────────────────
  const rsiSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color:'#a78bfa', lineWidth:1, priceLineVisible:false,
    priceFormat: { type: 'price', precision: 0, minMove: 1 },
  }, 2);
  if (d.rsi) rsiSeries.setData(d.rsi);
  rsiSeries.createPriceLine({ price: 70, color: '#f85149', lineStyle: 2, lineWidth: 1, axisLabelVisible: true, title: '' });
  rsiSeries.createPriceLine({ price: 30, color: '#3fb950', lineStyle: 2, lineWidth: 1, axisLabelVisible: true, title: '' });

  // 0~100 boundary (invisible) — pane 2 에 같이
  const boundsSeries = chart.addSeries(LightweightCharts.LineSeries, {
    color: 'rgba(0,0,0,0)',
    lineWidth: 0,
    priceLineVisible: false,
    lastValueVisible: false,
    crosshairMarkerVisible: false,
  }, 2);
  if (d.rsi?.length) {
    boundsSeries.setData([
      { time: d.rsi[0].time, value: 0 },
      { time: d.rsi[d.rsi.length - 1].time, value: 100 },
    ]);
  }

  // 토글 시 재사용을 위해 핸들 보관
  _chartHandles = { chart, candleSeries, ma5, ma20, ma60, volSeries, rsiSeries, boundsSeries };

  // ── pane 높이 (캔들 360 / 거래량 100 / RSI 120 = 총 580 + 분리선) ──
  try {
    const panes = chart.panes();
    if (panes && panes.length >= 1) {
      if (panes[0] && panes[0].setHeight) panes[0].setHeight(360);
      if (panes[1] && panes[1].setHeight) panes[1].setHeight(100);
      if (panes[2] && panes[2].setHeight) panes[2].setHeight(120);
    }
  } catch (e) {
    console.warn('panes setHeight failed:', e);
  }

  // ── 진입/손절/목표 가격 라인 ────────────────────────────────────
  function applyPriceLines() {
    if (!_priceLineParams) return;
    const { entry, stop, target } = _priceLineParams;
    if (entry  != null) candleSeries.createPriceLine({ price: entry,  color:'#58a6ff', lineWidth:1, lineStyle:0, axisLabelVisible:true, title:'진입' });
    if (stop   != null) candleSeries.createPriceLine({ price: stop,   color:'#f85149', lineWidth:1, lineStyle:0, axisLabelVisible:true, title:'손절' });
    if (target != null) candleSeries.createPriceLine({ price: target, color:'#3fb950', lineWidth:1, lineStyle:0, axisLabelVisible:true, title:'목표' });
  }
  applyPriceLines();
  window._chartApplyPriceLines = applyPriceLines;

  // 정보 바 + fit
  _renderInfoBar(d);
  chart.timeScale().fitContent();

  window.addEventListener('resize', () => {
    chart.resize(el.offsetWidth, 600);
  });
}

initFav();
loadAnalysis();
loadChart();
</script>
</body>
</html>
